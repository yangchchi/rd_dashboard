name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality-gate:
    name: P0 quality gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run P0 checks
        run: npm run ci:check
